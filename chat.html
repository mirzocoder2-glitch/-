<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Чат — CodeAcademy TJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.chat-layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 57px); overflow: hidden; }
.chat-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
.chat-sidebar-hd { padding: 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; }
.user-list { flex: 1; overflow-y: auto; }
.user-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; transition: background .16s; border-bottom: 1px solid rgba(28,34,53,.4); position: relative; }
.user-item:hover { background: var(--card); }
.user-item.active { background: rgba(79,142,247,.1); border-left: 3px solid var(--accent); }
.user-item .avatar { width: 36px; height: 36px; font-size: 13px; flex-shrink: 0; }
.u-name { font-size: 13px; font-weight: 600; }
.u-last { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.unread-dot { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

.chat-main { display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); flex-shrink: 0; }
.chat-header .avatar { width: 36px; height: 36px; font-size: 13px; }
.chat-partner { font-size: 14px; font-weight: 700; }
.chat-status { font-size: 11px; color: var(--green); }
.chat-empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); }
.chat-empty-state .ei { font-size: 48px; }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 8px; max-width: 75%; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.msg.mine { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,var(--accent2),var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: auto; }
.msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.msg.theirs .msg-bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
.msg.theirs .msg-time { text-align: left; }
.msg-name { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }

.chat-input-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--surface); flex-shrink: 0; }
.msg-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 13px; outline: none; resize: none; max-height: 100px; min-height: 40px; transition: border-color .16s; }
.msg-input:focus { border-color: var(--accent); }
.send-btn { width: 40px; height: 40px; border-radius: 11px; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .16s; flex-shrink: 0; }
.send-btn:hover { background: #3a7be8; transform: scale(1.05); }

.date-sep { text-align: center; font-size: 11px; color: var(--muted); margin: 6px 0; position: relative; }
.date-sep::before { content:''; position:absolute; left:0; top:50%; width:100%; height:1px; background:var(--border); }
.date-sep span { background: var(--bg); padding: 0 10px; position: relative; }

@media(max-width:860px){ .chat-layout{grid-template-columns:1fr;} .chat-sidebar{display:none;} }
</style>
</head>
<body>
<script src="platform.js"></script>

<div class="sidebar">
  <div class="s-logo"><div class="s-logo-icon">&lt;/&gt;</div><div class="s-logo-text">CodeAcademy <small id="role-lbl">Талаба</small></div></div>
  <nav class="s-nav" id="side-nav"></nav>
  <div class="s-footer">
    <div class="avatar" id="av-init">ТА</div>
    <div class="av-info"><div class="av-name" id="av-name">Талаба</div><div class="av-role" id="av-role">Талаба</div></div>
    <button class="logout-btn" onclick="Auth.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="main" style="display:flex;flex-direction:column;">
  <div class="topbar" style="flex-shrink:0;">
    <div class="tb-title">💬 <span>Чат</span></div>
  </div>
  <div class="chat-layout">
    <!-- LEFT: user list (admin sees all pupils, pupil sees only admin) -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-hd" id="chat-sidebar-title">Суҳбатҳо</div>
      <div class="user-list" id="user-list"></div>
    </div>
    <!-- RIGHT: messages -->
    <div class="chat-main" id="chat-main">
      <div class="chat-empty-state" id="empty-state">
        <div class="ei">💬</div>
        <div style="font-size:14px;font-weight:600;">Суҳбатро интихоб кунед</div>
        <div style="font-size:12px;">Аз рӯйхати чап интихоб кунед</div>
      </div>
      <div id="active-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="chat-header">
          <div class="avatar" id="partner-avatar">—</div>
          <div><div class="chat-partner" id="partner-name">—</div><div class="chat-status">● Онлайн</div></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input-bar">
          <textarea class="msg-input" id="msg-input" placeholder="Паёмро нависед..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
          <button class="send-btn" onclick="sendMsg()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const me = Auth.require();
if(!me) Auth.logout();

// Setup UI
document.getElementById('av-name').textContent = me.name;
document.getElementById('av-init').textContent = initials(me.name);
document.getElementById('av-role').textContent = me.role==='admin'?'Администратор':'Талаба';
document.getElementById('role-lbl').textContent = me.role==='admin'?'Администратор':'Талаба';

// Nav
const nav = document.getElementById('side-nav');
if(me.role==='admin'){
  nav.innerHTML=`
    <a class="s-item" href="admin.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Панел</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item active" href="chat.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат</a>`;
} else {
  nav.innerHTML=`
    <a class="s-item" href="pupil.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Дашборд</a>
    <a class="s-item" href="courses.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Курсҳо</a>
    <a class="s-item" href="zadacha.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Вазифаҳо</a>
    <a class="s-item" href="test.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Тестҳо</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item" href="interpreter.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Интерпретатор</a>
    <a class="s-item" href="jadval.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Ҷадвал</a>
    <a class="s-item active" href="chat.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат</a>`;
}

let activePartnerId = null;
let pollInterval = null;

function getChatKey(uid1, uid2){
  return [uid1,uid2].sort((a,b)=>a-b).join('_');
}

function getConversation(uid1, uid2){
  const key = getChatKey(uid1,uid2);
  return DB.getMessages().filter(m=>m.chatKey===key);
}

function buildUserList(){
  const ul = document.getElementById('user-list');
  const msgs = DB.getMessages();

  if(me.role==='admin'){
    const pupils = Auth.getUsers().filter(u=>u.role==='pupil');
    if(!pupils.length){ ul.innerHTML='<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Талаба нест</div></div>'; return; }
    ul.innerHTML = pupils.map(u=>{
      const conv = getConversation(me.id, u.id);
      const last = conv[conv.length-1];
      const unread = conv.filter(m=>m.senderId!==me.id && !m.read).length;
      return `<div class="user-item ${activePartnerId===u.id?'active':''}" onclick="openChat(${u.id},'${u.name.replace(/'/g,"\\'")}')">
        <div class="avatar" style="width:36px;height:36px;font-size:12px">${initials(u.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="u-name">${u.name}</div>
          <div class="u-last">${last?last.text:'Паём нест'}</div>
        </div>
        ${unread>0?`<div class="unread-dot"></div>`:''}
      </div>`;
    }).join('');
  } else {
    // Pupil faqat admin ko'radi
    const admin = Auth.getUsers().find(u=>u.role==='admin');
    if(!admin){ ul.innerHTML='<div class="empty"><div class="empty-text">Admin нест</div></div>'; return; }
    const conv = getConversation(me.id, admin.id);
    const last = conv[conv.length-1];
    const unread = conv.filter(m=>m.senderId!==me.id && !m.read).length;
    ul.innerHTML = `<div class="user-item ${activePartnerId===admin.id?'active':''}" onclick="openChat(${admin.id},'${admin.name}')">
      <div class="avatar" style="width:36px;height:36px;font-size:12px;background:linear-gradient(135deg,#ef4444,#dc2626)">${initials(admin.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="u-name">🛡️ ${admin.name}</div>
        <div class="u-last">${last?last.text:'Суҳбатро оғоз кунед'}</div>
      </div>
      ${unread>0?`<div class="unread-dot"></div>`:''}
    </div>`;
    // Auto-open admin chat for pupil
    if(!activePartnerId) openChat(admin.id, admin.name);
  }
}

function openChat(partnerId, partnerName){
  activePartnerId = partnerId;
  document.getElementById('empty-state').style.display='none';
  const ac = document.getElementById('active-chat');
  ac.style.display='flex';
  document.getElementById('partner-name').textContent = partnerName;
  document.getElementById('partner-avatar').textContent = initials(partnerName);
  // Mark read
  markRead(partnerId);
  buildUserList();
  renderMessages();
  // Poll every 2s
  clearInterval(pollInterval);
  pollInterval = setInterval(()=>{ renderMessages(); buildUserList(); }, 2000);
  // Focus input
  setTimeout(()=>document.getElementById('msg-input').focus(), 100);
}

function markRead(partnerId){
  const all = DB.getMessages();
  const key = getChatKey(me.id, partnerId);
  let changed = false;
  all.forEach(m=>{ if(m.chatKey===key && m.senderId!==me.id && !m.read){ m.read=true; changed=true; } });
  if(changed) localStorage.setItem('plt_msgs', JSON.stringify(all));
}

function renderMessages(){
  if(!activePartnerId) return;
  const conv = getConversation(me.id, activePartnerId);
  const box = document.getElementById('messages');
  if(!conv.length){
    box.innerHTML=`<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:40px">💬 Суҳбатро оғоз кунед!</div>`;
    return;
  }
  let lastDate='';
  box.innerHTML = conv.map(m=>{
    const isMine = m.senderId===me.id;
    const d = new Date(m.date);
    const dateStr = d.toLocaleDateString('ru-RU');
    const timeStr = d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    let dateSep='';
    if(dateStr!==lastDate){ lastDate=dateStr; dateSep=`<div class="date-sep"><span>${dateStr}</span></div>`; }
    return `${dateSep}<div class="msg ${isMine?'mine':'theirs'}">
      <div class="msg-avatar">${initials(m.senderName||'?')}</div>
      <div>
        ${!isMine?`<div class="msg-name">${m.senderName}</div>`:''}
        <div class="msg-bubble">${m.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${timeStr}${isMine?(m.read?' ✓✓':' ✓'):''}</div>
      </div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function sendMsg(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text || !activePartnerId) return;
  const key = getChatKey(me.id, activePartnerId);
  DB.addMessage({ chatKey:key, senderId:me.id, senderName:me.name, text, read:false });
  input.value='';
  input.style.height='auto';
  renderMessages();
  buildUserList();
}

buildUserList();
</script>
</body>
</html>
