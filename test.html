<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Тестҳо — CodeAcademy TJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.tc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .22s;}
.tc:hover{transform:translateY(-3px);border-color:rgba(79,142,247,.3);}
.tc-icon{font-size:32px;margin-bottom:12px;}
.tc-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.tc-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.tc-foot{display:flex;justify-content:flex-end;}
.start-btn{padding:7px 18px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:all .16s;}
.start-btn:hover{background:#3a7be8;}

/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;}
.q-hd{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.timer{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--yellow);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);padding:7px 14px;border-radius:9px;flex-shrink:0;}
.timer.red{color:var(--danger);background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.22);}
.q-prog-info{flex:1;}
.q-prog-txt{font-size:11px;color:var(--muted);margin-bottom:4px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:16px;}
.q-num{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.q-text{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:22px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{padding:12px 16px;border-radius:11px;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;transition:all .16s;display:flex;align-items:center;gap:11px;}
.opt:hover{border-color:var(--accent);background:rgba(79,142,247,.06);}
.opt.sel{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--accent);}
.opt.cor{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green);}
.opt.wrn{border-color:var(--danger);background:rgba(239,68,68,.1);color:var(--danger);}
.opt-ltr{width:26px;height:26px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;}
.opt.sel .opt-ltr{background:rgba(79,142,247,.2);}
.opt.cor .opt-ltr{background:rgba(16,185,129,.2);}
.opt.wrn .opt-ltr{background:rgba(239,68,68,.2);}
.q-nav{display:flex;justify-content:flex-end;gap:9px;}

/* RESULT */
.res-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px;text-align:center;max-width:560px;margin:0 auto;}
.res-score{font-size:66px;font-weight:800;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;}
.res-lbl{font-size:13px;color:var(--muted);margin-bottom:24px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.res-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;}
.res-val{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;margin-bottom:3px;}
.res-item-lbl{font-size:11px;color:var(--muted);}

@media(max-width:860px){.test-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<script src="platform.js"></script>

<div class="sidebar">
  <div class="s-logo"><div class="s-logo-icon">&lt;/&gt;</div><div class="s-logo-text">CodeAcademy <small>Талаба</small></div></div>
  <nav class="s-nav">
    <a class="s-item" href="pupil.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Дашборд</a>
    <a class="s-item" href="courses.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Курсҳо</a>
    <a class="s-item" href="zadacha.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Вазифаҳо</a>
    <a class="s-item active" href="test.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Тестҳо</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item" href="interpreter.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Интерпретатор</a>
  </nav>
  <div class="s-footer">
    <div class="avatar" id="av-init">ТА</div>
    <div class="av-info"><div class="av-name" id="av-name">Талаба</div><div class="av-role">Талаба</div></div>
    <button class="logout-btn" onclick="Auth.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tb-title">✅ <span>Тестҳо</span></div>
    <div class="tb-right"><button class="btn btn-outline btn-sm" id="back-btn" onclick="showList()" style="display:none">← Бозгашт</button></div>
  </div>
  <div class="content">
    <div id="view-list">
      <div class="test-grid" id="test-grid"></div>
    </div>
    <div id="view-quiz" style="display:none">
      <div class="quiz-wrap">
        <div id="quiz-screen">
          <div class="q-hd">
            <div class="timer" id="timer">02:00</div>
            <div class="q-prog-info">
              <div class="q-prog-txt" id="q-prog-txt">Савол 1 аз 5</div>
              <div class="prog-wrap"><div class="prog-fill" id="q-prog-fill" style="width:20%"></div></div>
            </div>
          </div>
          <div class="q-card">
            <div class="q-num" id="q-num">САВОЛ 01</div>
            <div class="q-text" id="q-text"></div>
            <div class="opts" id="q-opts"></div>
          </div>
          <div class="q-nav">
            <button class="btn btn-outline" onclick="skipQ()">Гузар →</button>
            <button class="btn btn-primary" onclick="checkQ()">Тасдиқ кун</button>
          </div>
        </div>
        <div id="result-screen" style="display:none">
          <div class="res-card">
            <div style="font-size:44px;margin-bottom:14px">🏆</div>
            <div class="res-score" id="res-score"></div>
            <div class="res-lbl">Натиҷаи шумо</div>
            <div class="res-grid">
              <div class="res-item"><div class="res-val" style="color:var(--green)" id="res-cor"></div><div class="res-item-lbl">Дуруст</div></div>
              <div class="res-item"><div class="res-val" style="color:var(--danger)" id="res-wrn"></div><div class="res-item-lbl">Нодуруст</div></div>
              <div class="res-item"><div class="res-val" id="res-time"></div><div class="res-item-lbl">Вақт</div></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:center">
              <button class="btn btn-outline" onclick="restartTest()">🔄 Такрор</button>
              <button class="btn btn-primary" onclick="showList()">← Тестҳо</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const me = Auth.requirePupil();
if(me){ document.getElementById('av-name').textContent=me.name; document.getElementById('av-init').textContent=initials(me.name); }

let activeTest=null, curQ=0, sel=null, correct=0, wrong=0, secs=120, timerInt=null, answered=false;

function showList(){
  document.getElementById('view-list').style.display='';
  document.getElementById('view-quiz').style.display='none';
  document.getElementById('back-btn').style.display='none';
  clearInterval(timerInt);
  renderList();
}

function renderList(){
  const tests = DB.getTests();
  const courses = DB.getCourses();
  const results = DB.getResults().filter(r=>r.userId===me.id);
  const grid = document.getElementById('test-grid');
  if(!tests.length){ grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">✅</div><div class="empty-text">Ҳанӯз тест нест</div></div>'; return; }
  grid.innerHTML = tests.map(t=>{
    const c = courses.find(c=>c.id===t.courseId);
    const myResults = results.filter(r=>r.testId===t.id);
    const best = myResults.length ? Math.max(...myResults.map(r=>r.score)) : null;
    return `<div class="tc">
      <div class="tc-icon">${c?.emoji||'✅'}</div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-meta">
        <span>📋 ${t.questions?.length||0} савол</span>
        <span>⏱️ ${Math.floor((t.timeLimit||120)/60)} дақ</span>
        ${best!==null?`<span class="badge b-green">Беҳтарин: ${best}%</span>`:''}
      </div>
      <div class="tc-foot"><button class="start-btn" onclick="startTest(${t.id})">▶ Оғоз</button></div>
    </div>`;
  }).join('');
}

function startTest(id){
  activeTest = DB.getTests().find(t=>t.id===id);
  if(!activeTest||!activeTest.questions?.length){showToast('Тест бе савол аст','error');return;}
  curQ=0; sel=null; correct=0; wrong=0; answered=false; secs=activeTest.timeLimit||120;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-quiz').style.display='';
  document.getElementById('back-btn').style.display='';
  document.getElementById('quiz-screen').style.display='';
  document.getElementById('result-screen').style.display='none';
  clearInterval(timerInt);
  timerInt=setInterval(tick,1000);
  renderQ();
}

function tick(){
  secs--;
  const m=String(Math.floor(secs/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  const el=document.getElementById('timer');
  el.textContent=m+':'+s;
  el.className='timer'+(secs<=30?' red':'');
  if(secs<=0){clearInterval(timerInt);showResult();}
}

function renderQ(){
  answered=false; sel=null;
  const q=activeTest.questions[curQ];
  const tot=activeTest.questions.length;
  document.getElementById('q-num').textContent='САВОЛ '+String(curQ+1).padStart(2,'0');
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-prog-txt').textContent=`Савол ${curQ+1} аз ${tot}`;
  document.getElementById('q-prog-fill').style.width=((curQ+1)/tot*100)+'%';
  const letters=['A','B','C','D','E'];
  document.getElementById('q-opts').innerHTML=q.opts.map((o,i)=>`
    <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
      <div class="opt-ltr">${letters[i]}</div>${o}
    </div>
  `).join('');
}

function selectOpt(i){
  if(answered)return;
  sel=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>el.className='opt'+(idx===i?' sel':''));
}

function checkQ(){
  if(sel===null||answered)return;
  answered=true;
  const q=activeTest.questions[curQ];
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.className='opt'+(i===q.ans?' cor':i===sel&&sel!==q.ans?' wrn':'');
  });
  if(sel===q.ans)correct++;else wrong++;
  setTimeout(()=>{curQ++;if(curQ>=activeTest.questions.length){clearInterval(timerInt);showResult();}else renderQ();},1100);
}

function skipQ(){
  if(answered)return;
  wrong++; curQ++;
  if(curQ>=activeTest.questions.length){clearInterval(timerInt);showResult();}else renderQ();
}

function showResult(){
  const tot=activeTest.questions.length;
  const pct=Math.round(correct/tot*100);
  const elapsed=(activeTest.timeLimit||120)-secs;
  DB.addResult({userId:me.id, userName:me.name, testId:activeTest.id, testTitle:activeTest.title, score:pct, correct, wrong, elapsed});
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='';
  document.getElementById('res-score').textContent=pct+'%';
  document.getElementById('res-cor').textContent=correct;
  document.getElementById('res-wrn').textContent=wrong;
  document.getElementById('res-time').textContent=Math.floor(elapsed/60)+'д '+elapsed%60+'с';
}

function restartTest(){ if(activeTest) startTest(activeTest.id); }

showList();
</script>
</body>
</html>
