<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вазифаҳо — CodeAcademy TJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.task-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.t-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border-color .2s;}
.t-card:hover{border-color:rgba(79,142,247,.3);}
.t-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
.t-title{font-size:14px;font-weight:700;line-height:1.4;}
.t-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.t-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.t-footer{display:flex;align-items:center;justify-content:space-between;}
.submit-btn{padding:7px 16px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:all .16s;}
.submit-btn:hover{background:#3a7be8;}
.submit-btn:disabled{background:var(--green);cursor:default;opacity:.8;}
.submitted-tag{font-size:11px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px;}
@media(max-width:860px){.task-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<script src="platform.js"></script>

<div class="sidebar">
  <div class="s-logo"><div class="s-logo-icon">&lt;/&gt;</div><div class="s-logo-text">CodeAcademy <small>Талаба</small></div></div>
  <nav class="s-nav">
    <a class="s-item" href="pupil.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Дашборд</a>
    <a class="s-item" href="courses.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Курсҳо</a>
    <a class="s-item active" href="zadacha.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Вазифаҳо</a>
    <a class="s-item" href="test.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Тестҳо</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item" href="interpreter.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Интерпретатор</a>
  </nav>
  <div class="s-footer">
    <div class="avatar" id="av-init">ТА</div>
    <div class="av-info"><div class="av-name" id="av-name">Талаба</div><div class="av-role">Талаба</div></div>
    <button class="logout-btn" onclick="Auth.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="main">
  <div class="topbar"><div class="tb-title">📝 <span>Вазифаҳо</span></div></div>
  <div class="content">
    <div class="stats-row" id="stats-row"></div>
    <div class="task-grid" id="task-grid"></div>
  </div>
</div>

<!-- MODAL: SUBMIT -->
<div class="modal-overlay" id="modal-submit">
  <div class="modal">
    <div class="modal-title">📤 Вазифа супоридан</div>
    <div class="modal-sub" id="submit-task-title"></div>
    <div class="form-group">
      <label class="form-label">Ҷавоби шумо</label>
      <textarea class="form-input" id="sub-answer" placeholder="Ҷавобатонро ин ҷо нависед..." style="min-height:120px"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Файл илова кунед (ихтиёрӣ)</label>
      <div id="sub-dropzone" style="border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;" onclick="document.getElementById('sub-file').click()" ondragover="event.preventDefault();this.style.borderColor='var(--accent)'" ondragleave="this.style.borderColor='var(--border)'" ondrop="subDropFile(event)">
        <div style="font-size:24px;margin-bottom:6px">📎</div>
        <div style="font-size:12px;font-weight:600" id="sub-file-name">Файлро интихоб кунед</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">.py, .html, .js, .txt, .zip ва ғайра</div>
      </div>
      <input type="file" id="sub-file" style="display:none" onchange="subFileSelected(this)">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-submit')">Бекор</button>
      <button class="btn btn-primary" onclick="doSubmit()">Супоридан ✓</button>
    </div>
  </div>
</div>

<script>
const me = Auth.requirePupil();
if(me){ document.getElementById('av-name').textContent=me.name; document.getElementById('av-init').textContent=initials(me.name); }

let submitTaskId=null;

function render(){
  const tasks = DB.getTasks();
  const subs = DB.getSubmissions().filter(s=>s.userId===me.id);
  const done = subs.map(s=>s.taskId);
  const courses = DB.getCourses();

  // Stats
  const totalPts = subs.reduce((a,s)=>a+(s.points||0),0);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-box"><div class="stat-ico" style="background:rgba(79,142,247,.1);color:var(--accent)">📝</div><div class="stat-val" style="color:var(--accent)">${tasks.length}</div><div class="stat-lbl">Ҳамаи вазифаҳо</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(16,185,129,.1);color:var(--green)">✅</div><div class="stat-val" style="color:var(--green)">${subs.length}</div><div class="stat-lbl">Иҷрошуда</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(245,158,11,.1);color:var(--yellow)">⏳</div><div class="stat-val" style="color:var(--yellow)">${tasks.length-subs.length}</div><div class="stat-lbl">Интизор</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(124,58,237,.1);color:#a78bfa">🏆</div><div class="stat-val" style="color:#a78bfa">${totalPts}</div><div class="stat-lbl">Ҷамъи холҳо</div></div>
  `;

  const grid = document.getElementById('task-grid');
  if(!tasks.length){ grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📝</div><div class="empty-text">Ҳанӯз вазифа нест</div></div>'; return; }
  grid.innerHTML = tasks.map(t=>{
    const c = courses.find(c=>c.id===t.courseId);
    const isDone = done.includes(t.id);
    const isExpired = t.deadline && new Date(t.deadline)<new Date() && !isDone;
    return `<div class="t-card" style="${isDone?'border-color:rgba(16,185,129,.25)':''}">
      <div class="t-head">
        <div class="t-title">${t.title}</div>
        <span class="badge ${isDone?'b-green':isExpired?'b-red':'b-yellow'}">${isDone?'✓ Тамом':isExpired?'Муҳлат гузашт':'Кушода'}</span>
      </div>
      <div class="t-desc">${t.desc||''}</div>
      <div class="t-meta">
        ${c?`<span class="badge b-blue">${c.emoji||''} ${c.title}</span>`:''}
        <span class="badge b-yellow">📅 ${fmtDate(t.deadline)}</span>
        <span class="badge b-purple">+${t.points||0} хол</span>
      </div>
      <div class="t-footer">
        ${isDone ? `<div class="submitted-tag">✓ Супоридашуда</div>` : `<button class="submit-btn" onclick="openSubmit(${t.id},'${t.title.replace(/'/g,"\\'")}')">📤 Супоридан</button>`}
      </div>
    </div>`;
  }).join('');
}

let subFileData = null;

function subFileSelected(input){
  if(input.files[0]) applySubFile(input.files[0]);
}
function subDropFile(e){
  e.preventDefault();
  document.getElementById('sub-dropzone').style.borderColor='var(--border)';
  if(e.dataTransfer.files[0]) applySubFile(e.dataTransfer.files[0]);
}
function applySubFile(file){
  subFileData = file;
  document.getElementById('sub-file-name').textContent = '✓ ' + file.name;
  document.getElementById('sub-dropzone').style.borderColor = 'var(--green)';
}

function openSubmit(id, title){
  submitTaskId=id;
  subFileData=null;
  document.getElementById('submit-task-title').textContent='Вазифа: '+title;
  document.getElementById('sub-answer').value='';
  document.getElementById('sub-file-name').textContent='Файлро интихоб кунед';
  document.getElementById('sub-dropzone').style.borderColor='var(--border)';
  document.getElementById('sub-file').value='';
  openModal('modal-submit');
}

function doSubmit(){
  const answer = document.getElementById('sub-answer').value.trim();
  if(!answer && !subFileData){ showToast('Ҷавоб нависед ё файл илова кунед!','error'); return; }
  const task = DB.getTasks().find(t=>t.id===submitTaskId);
  const sub = {
    userId: me.id,
    userName: me.name,
    taskId: submitTaskId,
    taskTitle: task?.title,
    answer,
    fileName: subFileData ? subFileData.name : null,
    points: task?.points||0,
    status: 'pending'
  };
  // Агар файл бошад, ба base64 табдил диҳем
  if(subFileData){
    const reader = new FileReader();
    reader.onload = function(e){
      sub.fileData = e.target.result;
      DB.addSubmission(sub);
      closeModal('modal-submit');
      showToast('Вазифа ба Админ фиристода шуд! ✓');
      render();
    };
    reader.readAsDataURL(subFileData);
  } else {
    DB.addSubmission(sub);
    closeModal('modal-submit');
    showToast('Вазифа ба Админ фиристода шуд! ✓');
    render();
  }
}

document.getElementById('modal-submit').addEventListener('click',function(e){if(e.target===this)closeModal('modal-submit');});
render();
</script>
</body>
</html>
