<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Сертификат — CodeAcademy TJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.cert-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
.course-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; display: flex; align-items: center; gap: 16px; transition: all .2s; }
.course-card:hover { border-color: rgba(79,142,247,.3); transform: translateY(-2px); }
.course-card.done { border-color: rgba(16,185,129,.3); background: rgba(16,185,129,.04); }
.course-emoji { font-size: 36px; flex-shrink: 0; }
.course-info { flex: 1; }
.course-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.course-prog { margin-bottom: 10px; }
.course-prog-bar { height: 6px; background: var(--surface); border-radius: 100px; overflow: hidden; margin-bottom: 4px; }
.course-prog-fill { height: 100%; border-radius: 100px; background: var(--accent); transition: width .6s ease; }
.course-prog-txt { font-size: 11px; color: var(--muted); }
.cert-btn { padding: 8px 18px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Sora', sans-serif; transition: all .18s; }
.cert-btn.get { background: var(--green); color: #fff; }
.cert-btn.get:hover { background: #0ea472; }
.cert-btn.view { background: rgba(79,142,247,.12); color: var(--accent); border: 1px solid rgba(79,142,247,.25); }
.cert-btn.view:hover { background: var(--accent); color: #fff; }
.cert-btn.locked { background: var(--surface); color: var(--muted); border: 1px solid var(--border); cursor: not-allowed; }
.lock-info { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* CERTIFICATE MODAL */
#cert-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#cert-modal-overlay.open { display: flex; }

.cert-paper {
  background: #fff;
  width: 100%; max-width: 720px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  animation: popIn .3s ease;
}
@keyframes popIn { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }

.cert-inner {
  padding: 50px 60px;
  border: 12px solid transparent;
  background: linear-gradient(#fff,#fff) padding-box,
              linear-gradient(135deg, #c8a96e, #e8d5a3, #c8a96e, #a67c4a) border-box;
  text-align: center;
  color: #1a1a2e;
  position: relative;
}

.cert-inner::before {
  content: '';
  position: absolute; inset: 20px;
  border: 1px solid rgba(200,169,110,.4);
  border-radius: 2px;
  pointer-events: none;
}

.cert-logo { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #4f8ef7; letter-spacing: .1em; margin-bottom: 6px; }
.cert-divider { width: 80px; height: 2px; background: linear-gradient(90deg,transparent,#c8a96e,transparent); margin: 0 auto 20px; }
.cert-title { font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: .25em; text-transform: uppercase; color: #7a6540; margin-bottom: 8px; }
.cert-main-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 800; color: #1a1a2e; line-height: 1.1; margin-bottom: 20px; }
.cert-presented { font-size: 13px; color: #7a6540; letter-spacing: .1em; margin-bottom: 10px; }
.cert-name { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #4f8ef7; border-bottom: 2px solid #c8a96e; display: inline-block; padding-bottom: 6px; margin-bottom: 20px; }
.cert-for { font-size: 13px; color: #7a6540; margin-bottom: 8px; }
.cert-course { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 28px; }
.cert-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(200,169,110,.3); }
.cert-sign { text-align: center; }
.cert-sign-line { width: 140px; height: 1px; background: #c8a96e; margin-bottom: 6px; }
.cert-sign-name { font-size: 12px; font-weight: 700; color: #1a1a2e; }
.cert-sign-role { font-size: 10px; color: #7a6540; }
.cert-seal { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #c8a96e; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #7a6540; letter-spacing: .05em; text-transform: uppercase; text-align: center; }
.cert-date { font-size: 12px; color: #7a6540; }

.cert-actions { display: flex; gap: 10px; justify-content: center; padding: 16px; background: var(--card); border-top: 1px solid var(--border); }

@media(max-width:860px){ .cert-grid{grid-template-columns:1fr;} .cert-inner{padding:30px 24px;} .cert-main-title{font-size:26px;} .cert-name{font-size:22px;} }
</style>
</head>
<body>
<script src="platform.js"></script>

<div class="sidebar">
  <div class="s-logo"><div class="s-logo-icon">&lt;/&gt;</div><div class="s-logo-text">CodeAcademy <small>Талаба</small></div></div>
  <nav class="s-nav">
    <a class="s-item" href="pupil.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Дашборд</a>
    <a class="s-item" href="courses.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Курсҳо</a>
    <a class="s-item" href="zadacha.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Вазифаҳо</a>
    <a class="s-item" href="test.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Тестҳо</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item" href="interpreter.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Интерпретатор</a>
    <a class="s-item" href="jadval.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Ҷадвал</a>
    <a class="s-item" href="chat.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат</a>
    <a class="s-item active" href="certificate.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg> Сертификат</a>
  </nav>
  <div class="s-footer">
    <div class="avatar" id="av-init">ТА</div>
    <div class="av-info"><div class="av-name" id="av-name">Талаба</div><div class="av-role">Талаба</div></div>
    <button class="logout-btn" onclick="Auth.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="main">
  <div class="topbar"><div class="tb-title">🏅 <span>Сертификатҳо</span></div></div>
  <div class="content">
    <div class="stats-row" id="stats-row"></div>
    <div class="cert-grid" id="cert-grid"></div>
  </div>
</div>

<!-- CERTIFICATE VIEWER -->
<div id="cert-modal-overlay">
  <div class="cert-paper" id="cert-paper">
    <div class="cert-inner" id="cert-content"></div>
    <div class="cert-actions">
      <button class="btn btn-outline" onclick="closeCert()">✕ Ёпиш</button>
      <button class="btn btn-primary" onclick="printCert()">🖨️ Чоп кардан</button>
    </div>
  </div>
</div>

<script>
const me = Auth.requirePupil();
if(me){ document.getElementById('av-name').textContent=me.name; document.getElementById('av-init').textContent=initials(me.name); }

let activeCertCourse = null;

function render(){
  const courses = DB.getCourses();
  const progress = DB.getProgress(me.id);
  const certs = DB.getCerts(me.id);

  const total = courses.length;
  const earned = certs.length;
  const ready = courses.filter(c=>(progress[c.id]||0)>=100 && !certs.includes(c.id)).length;

  document.getElementById('stats-row').innerHTML=`
    <div class="stat-box"><div class="stat-ico" style="background:rgba(79,142,247,.1);color:var(--accent)">📚</div><div class="stat-val" style="color:var(--accent)">${total}</div><div class="stat-lbl">Ҳамаи курсҳо</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(16,185,129,.1);color:var(--green)">🏅</div><div class="stat-val" style="color:var(--green)">${earned}</div><div class="stat-lbl">Сертификат</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(245,158,11,.1);color:var(--yellow)">⭐</div><div class="stat-val" style="color:var(--yellow)">${ready}</div><div class="stat-lbl">Гирифта мешавад</div></div>
    <div class="stat-box"><div class="stat-ico" style="background:rgba(124,58,237,.1);color:#a78bfa">📊</div><div class="stat-val" style="color:#a78bfa">${total-earned-ready}</div><div class="stat-lbl">Идома дорад</div></div>
  `;

  if(!courses.length){ document.getElementById('cert-grid').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📚</div><div class="empty-text">Ҳанӯз курс нест</div></div>'; return; }

  document.getElementById('cert-grid').innerHTML = courses.map(c=>{
    const pct = progress[c.id]||0;
    const hasCert = certs.includes(c.id);
    const canGet = pct>=100 && !hasCert;
    return `<div class="course-card ${hasCert?'done':''}">
      <div class="course-emoji">${c.emoji||'📚'}</div>
      <div class="course-info">
        <div class="course-name">${c.title}</div>
        <div class="course-prog">
          <div class="course-prog-bar"><div class="course-prog-fill" style="width:${pct}%;${hasCert?'background:var(--green)':''}"></div></div>
          <div class="course-prog-txt">${hasCert?'✓ Тамоман гузаридед':pct+'% тамом'}</div>
        </div>
        ${hasCert
          ? `<button class="cert-btn view" onclick="viewCert(${c.id})">🏅 Сертификатро бинед</button>`
          : canGet
            ? `<button class="cert-btn get" onclick="getCert(${c.id})">🎉 Сертификат гиред!</button>`
            : `<button class="cert-btn locked" disabled>🔒 ${pct}% — ${100-pct}% монд</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function getCert(cid){
  DB.addCert(me.id, cid);
  showToast('🏅 Табрик! Сертификат гирифтед!');
  render();
  setTimeout(()=>viewCert(cid), 500);
}

function viewCert(cid){
  const course = DB.getCourses().find(c=>c.id===cid);
  if(!course) return;
  activeCertCourse = course;
  const admin = Auth.getUsers().find(u=>u.role==='admin');
  const today = new Date().toLocaleDateString('ru-RU');

  document.getElementById('cert-content').innerHTML=`
    <div class="cert-logo">✦ CODEACADEMY TJ ✦</div>
    <div class="cert-divider"></div>
    <div class="cert-title">Сертификати расмӣ</div>
    <div class="cert-main-title">Сертификат</div>
    <div class="cert-presented">Ба</div>
    <div class="cert-name">${me.name}</div>
    <div class="cert-for">барои муваффақона ба итмом расонидани курси</div>
    <div class="cert-course">${course.emoji||''} ${course.title}</div>
    <div class="cert-footer">
      <div class="cert-sign">
        <div class="cert-sign-line"></div>
        <div class="cert-sign-name">${admin?.name||'Администратор'}</div>
        <div class="cert-sign-role">Муаллим</div>
      </div>
      <div class="cert-seal">CODE<br>ACADEMY<br>TJ<br>✦</div>
      <div class="cert-date">
        <div style="font-size:11px;color:#7a6540;margin-bottom:4px">Санаи додан</div>
        <div style="font-weight:700;font-size:13px">${today}</div>
      </div>
    </div>
  `;
  document.getElementById('cert-modal-overlay').classList.add('open');
}

function closeCert(){
  document.getElementById('cert-modal-overlay').classList.remove('open');
}

function printCert(){
  const content = document.getElementById('cert-content').innerHTML;
  const win = window.open('','_blank','width=800,height=600');
  win.document.write(`<!DOCTYPE html><html><head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
      body{margin:0;background:#fff;}
      .cert-inner{padding:50px 60px;border:12px solid #c8a96e;text-align:center;color:#1a1a2e;font-family:Georgia,serif;}
      .cert-logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#4f8ef7;letter-spacing:.1em;margin-bottom:6px;}
      .cert-divider{width:80px;height:2px;background:#c8a96e;margin:0 auto 20px;}
      .cert-title{font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:#7a6540;margin-bottom:8px;}
      .cert-main-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:#1a1a2e;margin-bottom:20px;}
      .cert-presented{font-size:13px;color:#7a6540;margin-bottom:10px;}
      .cert-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#4f8ef7;border-bottom:2px solid #c8a96e;display:inline-block;padding-bottom:6px;margin-bottom:20px;}
      .cert-for{font-size:13px;color:#7a6540;margin-bottom:8px;}
      .cert-course{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:28px;}
      .cert-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:30px;padding-top:20px;border-top:1px solid rgba(200,169,110,.3);}
      .cert-sign-line{width:140px;height:1px;background:#c8a96e;margin-bottom:6px;}
      .cert-sign-name{font-size:12px;font-weight:700;}
      .cert-sign-role{font-size:10px;color:#7a6540;}
      .cert-seal{width:70px;height:70px;border-radius:50%;border:3px solid #c8a96e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#7a6540;text-align:center;}
      @media print{@page{margin:0;}}
    </style>
  </head><body><div class="cert-inner">${content}</div><script>window.onload=()=>{window.print();window.close();}<\/script></body></html>`);
  win.document.close();
}

document.getElementById('cert-modal-overlay').addEventListener('click',function(e){if(e.target===this)closeCert();});
render();
</script>
</body>
</html>
