<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ҷадвал — CodeAcademy TJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; margin-bottom: 24px; }
.day-col { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-height: 200px; }
.day-hd { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; }
.day-hd.today { background: rgba(79,142,247,.12); color: var(--accent); }
.day-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; line-height: 1; }
.day-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
.day-items { padding: 8px; display: flex; flex-direction: column; gap: 5px; }
.lesson-chip { padding: 7px 9px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: all .16s; border-left: 3px solid; }
.lesson-chip:hover { filter: brightness(1.2); }
.chip-time { font-family: 'Space Mono', monospace; font-size: 10px; opacity: .8; margin-bottom: 2px; }
.chip-title { font-weight: 600; line-height: 1.3; }
.chip-course { font-size: 10px; opacity: .7; margin-top: 2px; }

.add-fab { position: fixed; bottom: 28px; right: 28px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 8px 24px rgba(79,142,247,.4); transition: all .2s; display: flex; align-items: center; justify-content: center; z-index: 50; }
.add-fab:hover { transform: scale(1.1); background: #3a7be8; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; }

@media(max-width:860px){ .week-grid{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>
<script src="platform.js"></script>

<div class="sidebar">
  <div class="s-logo"><div class="s-logo-icon">&lt;/&gt;</div><div class="s-logo-text">CodeAcademy <small id="role-lbl">Талаба</small></div></div>
  <nav class="s-nav" id="side-nav"></nav>
  <div class="s-footer">
    <div class="avatar" id="av-init">ТА</div>
    <div class="av-info"><div class="av-name" id="av-name">Талаба</div><div class="av-role" id="av-role">Талаба</div></div>
    <button class="logout-btn" onclick="Auth.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tb-title">📅 <span>Ҷадвали дарсҳо</span></div>
    <div class="tb-right">
      <div id="week-nav" style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="changeWeek(-1)">← Пеш</button>
        <span id="week-label" style="font-size:13px;font-weight:600;min-width:160px;text-align:center"></span>
        <button class="btn btn-outline btn-sm" onclick="changeWeek(1)">Баъд →</button>
        <button class="btn btn-primary btn-sm" onclick="changeWeek(0)">Имрӯз</button>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="legend" id="legend"></div>
    <div class="week-grid" id="week-grid"></div>
  </div>
</div>

<!-- FAB for admin -->
<button class="add-fab" id="add-fab" onclick="openModal('modal-add')" title="Дарс илова кун" style="display:none">+</button>

<!-- MODAL ADD (admin only) -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title">📅 Дарс илова кардан</div>
    <div class="modal-sub">Ҷадвалга дарс монед</div>
    <div class="form-group"><label class="form-label">Номи дарс</label><input class="form-input" id="sc-title" placeholder="Масалан: Python — Функсияҳо"></div>
    <div class="form-group"><label class="form-label">Мавзӯъ</label><select class="form-input" id="sc-course"><option value="">— Интихоб кунед —</option></select></div>
    <div class="g2">
      <div class="form-group"><label class="form-label">Рӯз</label>
        <select class="form-input" id="sc-day">
          <option value="0">Якшанбе</option><option value="1">Душанбе</option><option value="2">Сешанбе</option>
          <option value="3">Чоршанбе</option><option value="4">Панҷшанбе</option><option value="5">Ҷумъа</option><option value="6">Шанбе</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Вақт</label><input class="form-input" id="sc-time" type="time" value="09:00"></div>
    </div>
    <div class="form-group"><label class="form-label">Давомнокӣ (дақиқа)</label><input class="form-input" id="sc-dur" type="number" value="60" min="15"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add')">Бекор</button>
      <button class="btn btn-primary" onclick="saveScheduleItem()">Сохтан</button>
    </div>
  </div>
</div>

<script>
const me = Auth.require();
if(!me) Auth.logout();
document.getElementById('av-name').textContent=me.name;
document.getElementById('av-init').textContent=initials(me.name);
document.getElementById('av-role').textContent=me.role==='admin'?'Администратор':'Талаба';
document.getElementById('role-lbl').textContent=me.role==='admin'?'Администратор':'Талаба';

// Show FAB for admin
if(me.role==='admin') document.getElementById('add-fab').style.display='flex';

// Nav
const nav=document.getElementById('side-nav');
if(me.role==='admin'){
  nav.innerHTML=`
    <a class="s-item" href="admin.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Панел</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item active" href="jadval.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Ҷадвал</a>
    <a class="s-item" href="chat.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат</a>`;
} else {
  nav.innerHTML=`
    <a class="s-item" href="pupil.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Дашборд</a>
    <a class="s-item" href="courses.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Курсҳо</a>
    <a class="s-item" href="zadacha.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Вазифаҳо</a>
    <a class="s-item" href="test.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Тестҳо</a>
    <a class="s-item" href="reyting.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Рейтинг</a>
    <a class="s-item" href="interpreter.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Интерпретатор</a>
    <a class="s-item active" href="jadval.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Ҷадвал</a>
    <a class="s-item" href="chat.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат</a>
    <a class="s-item" href="certificate.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg> Сертификат</a>`;
}

const COLORS = ['#4f8ef7','#10b981','#f59e0b','#7c3aed','#ef4444','#06b6d4'];
const DAYS_TG = ['Якшанбе','Душанбе','Сешанбе','Чоршанбе','Панҷшанбе','Ҷумъа','Шанбе'];

let weekOffset = 0;

function getWeekDates(offset=0){
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}

function changeWeek(dir){ if(dir===0) weekOffset=0; else weekOffset+=dir; render(); }

function render(){
  const dates = getWeekDates(weekOffset);
  const today = new Date();
  const schedule = DB.getSchedule();
  const courses = DB.getCourses();

  // Week label
  const fmt = d=>d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
  document.getElementById('week-label').textContent=`${fmt(dates[0])} — ${fmt(dates[6])}`;

  // Legend
  const leg=document.getElementById('legend');
  leg.innerHTML=courses.map((c,i)=>`<div class="leg-item"><div class="leg-dot" style="background:${COLORS[i%COLORS.length]}"></div><span>${c.emoji||''} ${c.title}</span></div>`).join('');

  // Grid
  const grid=document.getElementById('week-grid');
  grid.innerHTML=dates.map((date,di)=>{
    const isToday=date.toDateString()===today.toDateString();
    const dayItems=schedule.filter(s=>parseInt(s.day)===date.getDay());
    const sorted=dayItems.sort((a,b)=>a.time.localeCompare(b.time));
    return `<div class="day-col">
      <div class="day-hd ${isToday?'today':''}">
        <div class="day-num">${date.getDate()}</div>
        <div class="day-name">${DAYS_TG[date.getDay()].slice(0,3)}</div>
      </div>
      <div class="day-items">
        ${sorted.map(s=>{
          const c=courses.find(c=>c.id===s.courseId);
          const ci=courses.indexOf(c);
          const color=COLORS[ci%COLORS.length]||'#4f8ef7';
          return `<div class="lesson-chip" style="background:${color}18;border-color:${color};color:${color}" ${me.role==='admin'?`onclick="delItem(${s.id})" title="Нест кардан"`:''}>
            <div class="chip-time">${s.time} · ${s.duration||60}д</div>
            <div class="chip-title">${s.title}</div>
            ${c?`<div class="chip-course">${c.emoji||''} ${c.title}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function delItem(id){
  if(!confirm('Нест кунем?')) return;
  DB.deleteScheduleItem(id); render(); showToast('Нест шуд');
}

function saveScheduleItem(){
  const title=document.getElementById('sc-title').value.trim();
  if(!title){showToast('Номро ворид кунед','error');return;}
  const courseId=parseInt(document.getElementById('sc-course').value)||null;
  DB.addScheduleItem({
    title, courseId,
    day: document.getElementById('sc-day').value,
    time: document.getElementById('sc-time').value,
    duration: parseInt(document.getElementById('sc-dur').value)||60
  });
  closeModal('modal-add');
  ['sc-title','sc-dur'].forEach(id=>document.getElementById(id).value='');
  showToast('Дарс илова шуд! 📅'); render();
}

// Fill course select
function fillSelect(){
  const sel=document.getElementById('sc-course');
  const courses=DB.getCourses();
  sel.innerHTML='<option value="">— Интихоб кунед —</option>'+courses.map(c=>`<option value="${c.id}">${c.emoji||''} ${c.title}</option>`).join('');
}

document.getElementById('modal-add').addEventListener('click',function(e){if(e.target===this)closeModal('modal-add');});
document.getElementById('add-fab').addEventListener('click',()=>fillSelect());

render();
</script>
</body>
</html>
